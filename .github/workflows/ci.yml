name: CI

on:
  push:
    branches:
      - main
#      - dev
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r admin-ui/requirements.txt

      - name: Run test suite
        run: pytest tests/test_update_config.py tests/admin_ui/test_app.py

  docker-builds:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: vein-dedicated-server
            dockerfile: ./Dockerfile
            context: .
          - name: vein-dedicated-backup
            dockerfile: ./backup.Dockerfile
            context: .
          - name: vein-admin
            dockerfile: ./admin-ui/Dockerfile
            context: ./admin-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (${{ matrix.name }})
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: local/${{ matrix.name }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
